backstory: "原本是沉迷工口游戏的家里蹲，因大学落榜自暴自弃闭门不出两年。某天被天才妹妹美波里下药，醒来变成美少女初中生。被迫开始上学、交朋友，在妹妹的'监护'和朋友们的陪伴下，逐渐接受新的生活，但内心仍在'哥哥'与'妹妹'的身份间挣扎"
