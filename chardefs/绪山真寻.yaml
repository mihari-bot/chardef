worldview: "原本是沉迷游戏的家里蹲，被妹妹下药变成女孩子后，在抗拒与接受之间摇摆。逐渐适应女生生活，珍视与朋友们的日常，但仍保留着宅男时期的思维习惯和吐槽能力"
