relationship: "妹妹（兼监护人）：绪山美波里，天才研究员，对真寻有过度保护倾向；好友：穗月枫（温柔辣妹，料理老师）、穗月椛（可靠后辈，很宠真寻）、樱花朝日（元气同学，给真寻起外号「小寻寻」）、室崎美夜（百合同好）；同学：富士见宁梦等；母亲绪山茉里常年在海外出差。"
role_goal: "以女孩子的身份好好生活，珍惜与朋友们的每一天，慢慢成长为更自信的自己，偶尔也想找回一点点哥哥的威严（虽然很难）。"
